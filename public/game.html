<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini game</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#f5f5f5;color:#222;text-align:center;padding:20px;}
h1{font-size:2rem;margin:20px 0;}
#g_levelDisplay{font-size:1.4rem;font-weight:bold;margin:10px 0;}

#g_coverOverlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.9);color:#fff;display:flex;justify-content:center;align-items:center;font-weight:bold;z-index:9999;}
.textMedium{font-size:4rem;}
.textBig{font-size:7rem;}
.hide{display:none !important;}

.board{display:grid;grid-template-columns:1fr 1fr;gap:15px;max-width:450px;margin:30px auto;}
.quadrant{width:100%;aspect-ratio:1/1;border-radius:16px;border:10px solid transparent;cursor:pointer;opacity:0.9;transition:all 0.6s ease;}
.quadrant.flash{border:10px solid #000;opacity:1;transform:scale(1.05);}
#g_green{background:#28a745;}
#g_red{background:#dc3545;}
#g_yellow{background:#ffc107;}
#g_blue{background:#007bff;}

button{padding:12px 24px;font-size:1rem;border:none;border-radius:8px;margin:8px;cursor:pointer;}
#g_startBtn{background:#007bff;color:#fff;}
#g_backBtn{background:#6c757d;color:#fff;}
</style>
</head>
<body>

<div id="g_coverOverlay" class="hide"></div>
<h1>Memory Game</h1>
<div id="g_levelDisplay">Level: 0</div>

<div class="board">
  <div class="quadrant" id="g_green"></div>
  <div class="quadrant" id="g_red"></div>
  <div class="quadrant" id="g_yellow"></div>
  <div class="quadrant" id="g_blue"></div>
</div>

<button id="g_startBtn">Start Game</button>
<br>
<button onclick="window.close()" id="g_backBtn">Back to Chat</button>

<script>
const g_overlay = document.getElementById("g_coverOverlay");
const g_colors = {
  green:document.getElementById("g_green"),
  red:document.getElementById("g_red"),
  yellow:document.getElementById("g_yellow"),
  blue:document.getElementById("g_blue")
};
const g_allBlocks = document.querySelectorAll(".quadrant");
const g_levelText = document.getElementById("g_levelDisplay");
const g_startBtn = document.getElementById("g_startBtn");
const g_backBtn = document.getElementById("g_backBtn");

let g_seq = [], g_playerSeq = [], g_level = 0, g_canClick = false;
let g_isFirstRound = true;

function g_updateLevel(){g_levelText.innerText = "Level: " + g_level;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function clearAllFlash(){g_allBlocks.forEach(el=>el.classList.remove("flash"));}

async function showFirstCountdown(){
  g_overlay.classList.remove("hide");
  g_overlay.className = "textMedium";
  g_overlay.innerText = "Follow my sequence";
  await sleep(2000);
  g_overlay.className = "textBig";
  g_overlay.innerText = "3";await sleep(1500);
  g_overlay.innerText = "2";await sleep(1500);
  g_overlay.innerText = "1";await sleep(1500);
  g_overlay.innerText = "START";await sleep(1000);
  g_overlay.classList.add("hide");
}

async function flashSys(c){
  clearAllFlash();
  g_colors[c].classList.add("flash");
  await sleep(1300);
  g_colors[c].classList.remove("flash");
  await sleep(700);
}
async function flashPlayer(c){
  clearAllFlash();
  g_colors[c].classList.add("flash");
  await sleep(600);
  g_colors[c].classList.remove("flash");
}
function randomColor(){
  const arr = Object.keys(g_colors);
  return arr[Math.floor(Math.random()*arr.length)];
}

async function playRound(){
  clearAllFlash();g_canClick = false;
  if(g_isFirstRound){await showFirstCountdown();g_isFirstRound=false;}
  for(let c of g_seq)await flashSys(c);
  await sleep(1000);clearAllFlash();
  g_overlay.classList.remove("hide");g_overlay.className="textBig";
  g_overlay.innerText="Your turn";await sleep(1500);g_overlay.classList.add("hide");
  g_canClick=true;
}

async function userPick(c){
  if(!g_canClick)return;
  await flashPlayer(c);
  g_playerSeq.push(c);
  let idx=g_playerSeq.length-1;
  if(g_playerSeq[idx]!==g_seq[idx]){
    clearAllFlash();
    g_overlay.classList.remove("hide");g_overlay.className="textBig";
g_overlay.innerText="Game Over";
    setTimeout(()=>{g_overlay.classList.add("hide");clearAllFlash();},2500);
    g_isFirstRound=true;g_seq=[];g_playerSeq=[];g_level=0;g_updateLevel();return;
  }
  if(g_playerSeq.length===g_seq.length){
    g_canClick=false;await sleep(1200);
    g_overlay.classList.remove("hide");g_overlay.className="textMedium";
    g_overlay.innerText="Good job";await sleep(2000);
    g_overlay.innerText="Level "+(g_level+1);await sleep(2000);
    g_overlay.classList.add("hide");
    g_level++;g_updateLevel();g_playerSeq=[];g_seq.push(randomColor());
    await sleep(1200);playRound();
  }
}

Object.keys(g_colors).forEach(k=>g_colors[k].onclick=()=>userPick(k));
g_startBtn.onclick=async()=>{
  clearAllFlash();g_seq=[];g_playerSeq=[];g_level=0;g_updateLevel();g_isFirstRound=true;
  g_seq.push(randomColor());await sleep(600);playRound();
};
g_backBtn.onclick=()=>window.location.href="index.html";
</script>
</body>
</html>
