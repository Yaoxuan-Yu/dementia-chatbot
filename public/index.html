<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dementia Chatbot</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid h-100 g-0">
  <div class="row h-100 g-0 d-flex">

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
      
      <!-- Toggle Button -->
      <button id="sidebarToggle" class="btn btn-sm btn-light w-100 mb-2">
        <i class="bi bi-list"></i>
      </button>

      <button class="btn btn-light btn-sm new-chat-btn w-100 rounded-2" onclick="newChat()">
        <i class="bi bi-chat-dots"></i> <span class="sidebar-text small px-1">New Chat</span>
      </button>

      <!-- Chat History (SCROLLABLE) -->
      <div id="history-list" class="mt-2 history-scroll"></div>

      <!-- Spacer -->
      <div style="flex-grow:1;"></div>

      <!-- User Profile -->
      <div id="user-profile" class="user-profile mt-auto p-2">
      
        <!-- Username -->
        <div id="user-name" class="small sidebar-text text-muted fst-italic mb-2"></div>

        <!-- Logout Button -->
        <button id="logout-btn" class="btn btn-light btn-sm w-100 logout-btn">
          <i class="bi bi-box-arrow-right"></i>
          <span class="sidebar-text small px-1">Logout</span>
        </button>

      </div>

    </div>

    <!-- Chat Area -->
    <div class="d-flex flex-column chat-container">

      <!-- Header -->
      <div class="chat-header d-flex align-items-center">
        <img src="assets/avatar.png" class="avatar me-2">
        <div>
          <div class="title">CareGuide Assistant</div>
          <small class="text-muted">Online</small>
        </div>
      </div>

      <!-- Chat -->
      <div id="chat-box" class="chat-box flex-grow-1"></div>

      <!-- Input -->
      <div class="input-area">
        <input id="user-input" class="form-control" placeholder="Type your message..." disabled>
        <button class="btn btn-light send-btn" onclick="sendMessage()">
          <i class="bi bi-send-fill"></i>
        </button>
      </div>

    </div>

  </div>
</div>

<script src="script.js?v=3"></script>
</body>
</html>
